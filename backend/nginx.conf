# Nginx Configuration for Medclara Backend
# Production-ready reverse proxy with security, performance, and HIPAA-compliance features

# Note: Change 'nginx' to your system's web server user (www-data, apache, etc.)
# Or comment out to run as current user (development only)
user www-data;
worker_processes auto;
worker_rlimit_nofile 65535;  # Increase file descriptor limit for worker connections
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 4096;
    use epoll;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Logging format with additional context for audit logging (HIPAA-compliance)
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'rt=$request_time uct="$upstream_connect_time" '
                    'uht="$upstream_header_time" urt="$upstream_response_time"';

    access_log /var/log/nginx/access.log main;

    # Performance optimizations
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 100M;  # Support 100MB audio uploads

    # Gzip compression for JSON responses
    gzip on;
    gzip_vary on;
    gzip_min_length 1000;
    gzip_proxied any;
    gzip_types text/plain text/css text/xml text/javascript 
               application/x-javascript application/xml+rss 
               application/rss+xml application/json;
    gzip_disable "msie6";

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    # Upstream backend service
    upstream medclara_backend {
        # Add multiple backend instances for load balancing (optional)
        server localhost:8000 max_fails=3 fail_timeout=30s;
        # server localhost:8001 max_fails=3 fail_timeout=30s;
        # server localhost:8002 max_fails=3 fail_timeout=30s;
        
        keepalive 32;
    }

    # Rate limiting zones (DDoS protection)
    limit_req_zone $binary_remote_addr zone=general:10m rate=100r/s;
    limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/s;           # Stricter for auth
    limit_req_zone $binary_remote_addr zone=upload:10m rate=10r/m;        # Chunked upload
    limit_req_zone $binary_remote_addr zone=streaming:10m rate=50r/s;     # SSE streams

    # HTTP redirect to HTTPS (production only)
    server {
        listen 80;
        server_name _;
        
        # Allow health checks without redirect
        location /health {
            proxy_pass http://medclara_backend;
            proxy_set_header Host $host;
        }

        # Let's Encrypt ACME challenge pass through
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # Redirect all other traffic to HTTPS
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # HTTPS server (main application)
    server {
        listen 443 ssl http2;
        server_name _;  # Change to your domain

        # SSL configuration - update domain name below
        # For Let's Encrypt, use: /etc/letsencrypt/live/api.medclara.in/fullchain.pem
        # For self-signed, use: /etc/nginx/certs/medclara.crt
        ssl_certificate /etc/letsencrypt/live/api.medclara.in/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/api.medclara.in/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;

        # Security headers
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "no-referrer-when-downgrade" always;

        # Access logging for audit trail (HIPAA compliance)
        access_log /var/log/nginx/medclara_access.log main;
        error_log /var/log/nginx/medclara_error.log warn;

        # Root path
        location / {
            limit_req zone=general burst=20 nodelay;
            
            proxy_pass http://medclara_backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Port $server_port;

            # Timeouts
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;

            # Connection management
            proxy_buffering off;  # Important for SSE streaming
            proxy_cache off;
        }

        # Health check endpoint (no rate limiting)
        location /health {
            access_log off;
            proxy_pass http://medclara_backend;
            proxy_set_header Host $host;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }

        # Authentication endpoints (stricter rate limiting)
        location ~ ^/api/auth/ {
            limit_req zone=auth burst=5 nodelay;
            
            proxy_pass http://medclara_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_connect_timeout 30s;
            proxy_send_timeout 30s;
            proxy_read_timeout 30s;
        }

        # Chunked upload endpoints (higher rate limit for multipart uploads)
        location ~ ^/api/recordings/chunked/ {
            limit_req zone=upload burst=15 nodelay;
            
            client_max_body_size 100M;  # Support large audio chunks
            
            proxy_pass http://medclara_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;

            # Extended timeouts for large uploads
            proxy_connect_timeout 120s;
            proxy_send_timeout 300s;
            proxy_read_timeout 300s;

            # Buffering settings for large uploads
            proxy_request_buffering off;
            proxy_buffering off;
        }

        # Recording upload endpoint (standard uploads)
        location ~ ^/api/recordings/upload$ {
            limit_req zone=upload burst=10 nodelay;
            
            client_max_body_size 100M;
            
            proxy_pass http://medclara_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Extended timeouts for processing
            proxy_connect_timeout 120s;
            proxy_send_timeout 300s;
            proxy_read_timeout 300s;
        }

        # Server-Sent Events (SSE) streaming endpoints (higher rate limit)
        location ~ ^/api/recordings/.*/stream$ {
            limit_req zone=streaming burst=50 nodelay;
            
            proxy_pass http://medclara_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Cache-Control "no-cache";
            proxy_set_header Connection "";

            # SSE-specific settings
            proxy_buffering off;  # Crucial for real-time streaming
            proxy_cache off;
            proxy_connect_timeout 60s;
            proxy_send_timeout 3600s;     # Long-lived connections
            proxy_read_timeout 3600s;     # Long-lived connections
        }

        # API endpoints with standard rate limiting
        location ~ ^/api/ {
            limit_req zone=general burst=30 nodelay;
            
            proxy_pass http://medclara_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Port $server_port;

            # Standard timeouts
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;

            # Connection management
            proxy_buffering off;
            proxy_cache off;
        }

        # Deny access to sensitive files
        location ~ /\. {
            deny all;
            access_log off;
            log_not_found off;
        }

        # Deny access to uploads directory browsing
        location /uploads/ {
            deny all;
            access_log off;
        }

        # Static files caching (if any)
        location ~* \.(css|js|jpg|jpeg|png|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 7d;
            add_header Cache-Control "public, immutable";
        }
    }

    # Redirect www to non-www (optional, customize as needed)
    server {
        listen 443 ssl http2;
        server_name www.*;

        # Update domain name to match your Let's Encrypt certificate
        ssl_certificate /etc/letsencrypt/live/api.medclara.in/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/api.medclara.in/privkey.pem;

        return 301 https://$host$request_uri;
    }
}
